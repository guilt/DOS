MODEM_NAME      Motorola codex 326X Series
;
; These modems only autobaud at 38,400 bps and slower.  Follow these steps
; to run at the DTE rate of 57,600.
;
;     1. Bring up your terminal emulation software at 38,400 bps or slower.
;     2. Type "AT&F*DE16&W" and press ENTER.  This sets the modem's DTE rate
;        to 57,600 bps.  Change your terminal emulator to 57,600 bps.  Verify
;        the DTE rate change by typing "AT&V" then enter.  The modem's
;        configuration information should be displayed.
;     3. Exit your terminal emulator then run DIALER, LDU-MGR or CSCONFIG.
;        Select MODEM CONFIGURATION, make sure the selected modem is
;        "Motorola codex 326X Series", then place the command "*DE16" into
;        the init string after the last command.  This will set the DTE rate
;        to 57,600 bps when calls are placed.
;
INIT_STRING     AT&F&C1&D2*FL3
CONNECT_STRING	CONNECT
CANCEL_STRING1	NO CARRIER
CANCEL_STRING2	ERROR
CANCEL_STRING3	NO DIAL
CANCEL_STRING4	BUSY
CANCEL_STRING5	NO ANSWER
DIAL_PREFIX	ATDT

